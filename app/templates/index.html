<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* INLINE CSS - GUARANTEED TO WORK */
        :root {
            --bg-primary: #0B0F19;
            --bg-secondary: #111827;
            --bg-tertiary: #1F2937;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --text-tertiary: #6B7280;
            --profit-green: #16C784;
            --loss-red: #EA3943;
            --accent-blue: #3B82F6;
            --warning-yellow: #F59E0B;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }

        [data-theme="light"] {
            --bg-primary: #F9FAFB;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F3F4F6;
            --border-color: #E5E7EB;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-tertiary: #9CA3AF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-secondary);
        }

        .logo {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.25em;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563EB 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2em;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            border-color: var(--accent-blue);
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .nav-tab {
            flex: 1;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            text-align: center;
            transition: all 0.2s ease;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .nav-tab.active {
            background: var(--accent-blue);
            color: white;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        .card h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.25em;
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 0.875em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--bg-secondary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .toggle-group {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .toggle-option {
            flex: 1;
            position: relative;
            cursor: pointer;
        }

        .toggle-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .toggle-option span {
            display: block;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            font-size: 0.875em;
            transition: all 0.2s ease;
        }

        .toggle-option input[type="radio"]:checked + span {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .risk-display-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .risk-item {
            background: var(--bg-tertiary);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .risk-label {
            font-size: 0.875em;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
        }

        .risk-value {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .btn-primary {
            width: 100%;
            padding: 12px 24px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #2563EB;
            transform: translateY(-1px);
        }

        .loading {
            text-align: center;
            color: var(--text-tertiary);
            padding: 40px;
        }

        .screenshot-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .screenshot-section h3 {
            margin-bottom: 16px;
            font-size: 1em;
            font-weight: 600;
        }

        .screenshot-method {
            display: flex;
            flex-direction: column;
        }

        .screenshot-method label {
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 0.875em;
        }

        .screenshot-method input[type="file"] {
            padding: 10px;
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .trade-item {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0;
            margin-bottom: 16px;
            background: var(--bg-tertiary);
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .trade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            cursor: pointer;
        }

        .trade-pair {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--text-primary);
        }

        .trade-status {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-open {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning-yellow);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .status-closed {
            background: rgba(22, 199, 132, 0.1);
            color: var(--profit-green);
            border: 1px solid rgba(22, 199, 132, 0.2);
        }

        .btn-export {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-export:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .header-actions {
            position: absolute;
            top: 50%;
            right: 100px;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">
                <div class="logo-icon">TJ</div>
                <span>TradeJournal</span>
            </a>
            
            <h1>Trading Journal</h1>
            <p>Professional Trade Analytics</p>
            
            <div class="header-actions">
                <button onclick="exportToCSV()" class="btn-export">
                    Export CSV
                </button>
            </div>
            
            <div class="theme-toggle" onclick="toggleTheme()">
                <span class="theme-toggle-text" id="theme-text">Dark</span>
            </div>
        </header>
        
        <nav class="nav-tabs">
            <a href="/" class="nav-tab active">Journal</a>
            <a href="/dashboard" class="nav-tab">Dashboard</a>
            <a href="/reports" class="nav-tab">Reports</a>
        </nav>
        
        <main>
            <div class="card">
                <h2>New Trade</h2>
                <form id="trade-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Currency Pair</label>
                            <input type="text" id="pair" placeholder="EURUSD" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Session</label>
                            <select id="session" required>
                                <option value="Asian">Asian</option>
                                <option value="London">London</option>
                                <option value="New York">New York</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Timeframe</label>
                            <select id="timeframe" required>
                                <option value="M5">M5</option>
                                <option value="M15">M15</option>
                                <option value="H1">H1</option>
                                <option value="H4">H4</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Setup Type</label>
                            <input type="text" id="setup_type" placeholder="EMA + Trendline" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Trade Type</label>
                            <select id="trade_type" required>
                                <option value="Buy">Buy</option>
                                <option value="Sell">Sell</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Entry Price</label>
                            <input type="number" step="0.00001" id="entry_price" placeholder="1.08500" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Stop Loss</label>
                            <input type="number" step="0.00001" id="stop_loss" placeholder="1.08300" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Take Profit</label>
                            <input type="number" step="0.00001" id="take_profit" placeholder="1.08900" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Position Size (lots)</label>
                            <input type="number" step="0.01" id="position_size" placeholder="0.10" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Confidence (1-5)</label>
                            <select id="confidence" required>
                                <option value="3">3 - Neutral</option>
                                <option value="4">4 - Confident</option>
                                <option value="5">5 - Very Confident</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Emotion Before Trade</label>
                            <select id="emotion_before">
                                <option value="Calm">Calm</option>
                                <option value="Excited">Excited</option>
                                <option value="Confident">Confident</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Followed All Rules?</label>
                            <div class="toggle-group">
                                <label class="toggle-option">
                                    <input type="radio" name="rule_followed" value="yes" checked>
                                    <span>Yes</span>
                                </label>
                                <label class="toggle-option">
                                    <input type="radio" name="rule_followed" value="no">
                                    <span>No</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-group full-width">
                            <label>Notes</label>
                            <textarea id="notes" rows="3" placeholder="Trade notes..."></textarea>
                        </div>
                    </div>
                    
                    <div class="risk-display-row">
                        <div class="risk-item">
                            <span class="risk-label">R:R Ratio</span>
                            <span class="risk-value" id="rr-value">0.00</span>
                        </div>
                        <div class="risk-item">
                            <span class="risk-label">Risk %</span>
                            <span class="risk-value" id="risk-percentage">0.00%</span>
                        </div>
                    </div>
                    
                    <div class="screenshot-section">
                        <h3>Screenshot</h3>
                        <div class="screenshot-method">
                            <label>Before Entry</label>
                            <input type="file" id="screenshot-before" accept="image/*">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary">Add Trade</button>
                </form>
            </div>
            
            <div class="card">
                <h2>Recent Trades</h2>
                <div id="trades-list">
                    <p class="loading">Loading trades...</p>
                </div>
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-text').textContent = newTheme === 'light' ? 'Light' : 'Dark';
        }
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-text').textContent = savedTheme === 'light' ? 'Light' : 'Dark';

        async function exportToCSV() {
            try {
                const response = await fetch('/api/trades/export/csv');
                if (!response.ok) {
                    alert('No trades to export');
                    return;
                }
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `trades_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                console.error(error);
            }
        }
    </script>
</body>
</html>
