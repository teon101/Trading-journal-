<!DOCTYPE html>
<html lang="en">
<head>
    <nav class="nav-tabs">
    <a href="/" class="nav-tab active">📝 Journal</a>
    <a href="/dashboard" class="nav-tab">📊 Dashboard</a>
</nav>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Trading Journal</h1>
            <p>Track. Analyze. Improve.</p>
        </header>
        
        <main>
            <!-- Add Trade Form -->
            <div class="card">
                <h2>📝 New Trade</h2>
                <form id="trade-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Currency Pair</label>
                            <input type="text" id="pair" placeholder="EURUSD" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Session</label>
                            <select id="session" required>
                                <option value="Asian">Asian</option>
                                <option value="London">London</option>
                                <option value="New York">New York</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Timeframe</label>
                            <select id="timeframe" required>
                                <option value="M1">M1</option>
                                <option value="M5">M5</option>
                                <option value="M15">M15</option>
                                <option value="M30">M30</option>
                                <option value="H1">H1</option>
                                <option value="H4">H4</option>
                                <option value="D1">D1</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Setup Type</label>
                            <input type="text" id="setup_type" placeholder="EMA + Trendline" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Trade Type</label>
                            <select id="trade_type" required>
                                <option value="Buy">Buy</option>
                                <option value="Sell">Sell</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Entry Price</label>
                            <input type="number" step="0.00001" id="entry_price" placeholder="1.08500" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Stop Loss</label>
                            <input type="number" step="0.00001" id="stop_loss" placeholder="1.08300" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Take Profit</label>
                            <input type="number" step="0.00001" id="take_profit" placeholder="1.08900" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Position Size (lots)</label>
                            <input type="number" step="0.01" id="position_size" placeholder="0.10" required>
                        </div>
                        
                        <div class="form-group full-width">
                            <label>Notes</label>
                            <textarea id="notes" rows="3" placeholder="Trade notes..."></textarea>
                        </div>
                    </div>
                    
                    <div class="rr-display" id="rr-display">
                        R:R Ratio: <span id="rr-value">0.00</span>
                    </div>
                    
                    <!-- Screenshot Section -->
                    <div class="screenshot-section">
                        <h3>📸 Screenshots</h3>
                        <div class="screenshot-options">
                            <div class="screenshot-method">
                                <label>Before Entry Screenshot</label>
                                <input type="file" id="screenshot-before" accept="image/*">
                                <small>Upload chart screenshot before entering trade</small>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary">Add Trade</button>
                </form>
            </div>
            
            <!-- Trades List -->
            <div class="card">
                <h2>📊 Recent Trades</h2>
                <div id="trades-list">
                    <p class="loading">Loading trades...</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Tag Modal -->
    <div id="tag-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🏷️ Manage Tags</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div id="available-tags"></div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
